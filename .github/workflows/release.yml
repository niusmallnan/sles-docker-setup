name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      
      - name: Build Binary
        run: |
          GIT_VERSION="${GITHUB_REF_NAME}" make build
      
      - name: Create Release Archive
        run: |
          GIT_VERSION="${GITHUB_REF_NAME}" make release
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            docker-pilot-linux-amd64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
